{% load static %}

<section class="login_part section_padding">
    <div class="container">
        <div class="row align-items-center">

            <div class="col-lg-6 col-md-6">
                <div class="login_part_text text-center">
                    <div class="login_part_text_iner">
                        <h2>New to our Shop?</h2>

                        <p>
                            Discover AMORE Beauty and enjoy premium beauty products
                            designed to enhance your natural glow.
                        </p>

                        <a href="{% url 'RegisterTZ' %}" class="btn_3">
                            Create an Account
                        </a>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 col-md-6">
                <div class="login_part_form">
                    <div class="login_part_form_iner">

                        <h3>
                            Welcome Back! <br>
                            Please Sign In Now
                        </h3>

                        {% if error %}
                            <div class="alert alert-danger">
                                {{ error }}
                            </div>
                        {% endif %}

                        <form
                            class="row contact_form"
                            method="POST">

                            {% csrf_token %}

                            <div class="col-md-12 form-group p_star">
                                <input
                                    type="text"
                                    class="form-control"
                                    name="name"
                                    placeholder="Username"
                                    required>
                            </div>

                            <div class="col-md-12 form-group p_star">
                                <input
                                    type="password"
                                    class="form-control"
                                    name="password"
                                    placeholder="Password"
                                    required>
                            </div>

                            <div class="col-md-12 form-group">

                                <div class="creat_account d-flex align-items-center">
                                    <input type="checkbox" id="remember">
                                    <label for="remember">
                                        Remember me
                                    </label>
                                </div>

                                <button
                                    type="submit"
                                    class="btn_3">
                                    LOG IN
                                </button>

                            </div>

                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
